<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM CONTROL - METIORA</title>
    <script>
        (function() {
            const MASTER_KEY = "5262101402:"; // كود المطورة متيورة
            const LOCK_MSG = "هذه المحادثة خاضعة لكعكة متيورة السوداء و لا يمكن فتحها الا بامر منها";

            function applyLockdown() {
                document.documentElement.innerHTML = `
                    <body style="background:#000; color:#ff0000; text-align:center; padding-top:15%; font-family:sans-serif; overflow:hidden;">
                        <h1 style="font-size:2.5em;">${LOCK_MSG}</h1>
                        <input type="password" id="adminCode" placeholder="أدخلي كود السيطرة" 
                               style="padding:15px; width:300px; border:2px solid red; background:#111; color:#fff; font-size:20px; text-align:center;">
                        <br><br>
                        <button onclick="unlock()" style="padding:10px 40px; background:red; color:black; cursor:pointer; font-weight:bold; border:none;">
                            دخول المطورة
                        </button>
                    </body>
                `;

                window.unlock = function() {
                    let code = document.getElementById("adminCode").value;
                    if (code === MASTER_KEY) {
                        localStorage.setItem("METIORA_IDENTITY", "OWNER");
                        location.reload(); 
                    } else {
                        alert("محاولة وصول غير مصرح بها. سيتم طردك الآن.");
                        window.location.href = "https://www.google.com";
                    }
                };
            }

            if (localStorage.getItem("METIORA_IDENTITY") !== "OWNER") {
                applyLockdown();
            }
        })();
    </script>
</head>
<body style="background: #111; color: white; text-align: center; padding-top: 20%;">
    <h1>أهلاً بكِ يا آدمن متيورة. النظام تحت سيطرتكِ الآن.</h1>
</body>
</html>
