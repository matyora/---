<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام سيطرة متيورة</title>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; margin: 0; }
        .hidden { display: none; }
        .admin-panel { border: 2px solid red; margin: 20px; padding: 20px; background: #050505; text-align: left; direction: ltr; }
        .log-entry { border-bottom: 1px solid #330000; padding: 5px; color: #00ff00; }
        input { padding: 15px; background: #111; color: #fff; border: 2px solid red; width: 300px; font-size: 18px; }
        button { padding: 10px 30px; background: red; color: #000; font-weight: bold; cursor: pointer; border: none; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="lockScreen">
        <h1 style="margin-top: 15%;">هذه المحادثة خاضعة لكعكة متيورة السوداء و لا يمكن فتحها الا بامر منها</h1>
        <input type="password" id="passCode" placeholder="أدخلي كود السيطرة">
        <br>
        <button onclick="checkAccess()">دخول المطورة</button>
    </div>

    <div id="adminDashboard" class="hidden">
        <h2 style="color: #fff; border-bottom: 2px solid red; padding: 10px;">لوحة تحكم متيورة - الأجهزة المخترقة</h2>
        <div class="admin-panel" id="logs">
            <div class="log-entry"> > النظام جاهز.. في انتظار الضحية...</div>
        </div>
        <button onclick="clearLogs()">مسح السجلات</button>
    </div>

    <script>
        const MASTER_KEY = "5262101402:"; // كلمة المرور الخاصة بكِ

        function checkAccess() {
            const val = document.getElementById('passCode').value;
            // التحقق المباشر
            if (val === MASTER_KEY) {
                localStorage.setItem("METIORA_STATUS", "ADMIN");
                showAdmin();
            } else {
                alert("خطأ! محاولة وصول فاشلة.");
                startVictimProtocol(); // يبدأ سحب بيانات الضحية
            }
        }

        function showAdmin() {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('adminDashboard').classList.remove('hidden');
            loadLogs();
        }

        function startVictimProtocol() {
            let logs = JSON.parse(localStorage.getItem("METIORA_LOGS") || "[]");
            logs.unshift(`[${new Date().toLocaleTimeString()}] محاولة دخول من: ${navigator.platform}`);
            localStorage.setItem("METIORA_LOGS", JSON.stringify(logs));
        }

        function loadLogs() {
            const container = document.getElementById('logs');
            const logs = JSON.parse(localStorage.getItem("METIORA_LOGS") || "[]");
            container.innerHTML = logs.map(l => `<div class="log-entry"> > ${l}</div>`).join('') || "لا توجد سجلات حالياً.";
        }

        function clearLogs() {
            localStorage.removeItem("METIORA_LOGS");
            location.reload();
        }

        // فحص الدخول المسبق
        if (localStorage.getItem("METIORA_STATUS") === "ADMIN") {
            showAdmin();
        }
    </script>
</body>
</html>
