<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>METIORA OMNI-CONTROL v8</title>
    <style>
        :root { --main-color: #ff0000; --bg-color: #000; }
        body { background: var(--bg-color); color: var(--main-color); font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; transition: 0.5s; }
        .hidden { display: none; }
        .panel { border: 2px solid var(--main-color); margin: 15px; padding: 15px; background: #050505; border-radius: 8px; box-shadow: 0 0 10px var(--main-color); }
        input { padding: 12px; margin: 5px; background: #111; color: #00ff00; border: 1px solid var(--main-color); width: 260px; }
        button { padding: 10px 20px; background: var(--main-color); color: #000; font-weight: bold; border: none; cursor: pointer; margin: 5px; }
        
        /* زر البرمجة العلوي لمتيورة فقط */
        .dev-tool { position: fixed; top: 10px; right: 10px; font-size: 24px; cursor: pointer; z-index: 1000; filter: drop-shadow(0 0 5px red); }
        
        /* تصميم زر جوجل */
        .google-btn { background: white; color: #444; width: 240px; border-radius: 5px; border: 1px solid #ddd; padding: 10px; font-weight: bold; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; margin-top: 10px; }
        .google-btn img { width: 18px; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="devIcon" class="dev-tool hidden" onclick="openDevMode()">✏️🔨</div>

    <marquee id="ownerMessage">نظام السيطرة خاضع لإرادة المطورة متيورة</marquee>

    <div id="authBox" style="text-align:center">
        <h1 style="margin-top: 5%;">METIORA LOCKDOWN</h1>
        <div id="loginForm">
            <input type="text" id="userInput" placeholder="اسم المستخدم">
            <br>
            <input type="password" id="passInput" placeholder="كلمة المرور">
            <br>
            <button onclick="handleLogin()">دخول</button>
            <br>
            <div class="google-btn" onclick="googleBypass()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg">
                تسجيل الدخول عبر Google
            </div>
        </div>
    </div>

    <div id="twoStepAdmin" class="hidden" style="text-align:center">
        <h2>درع متيورة: التحقق الأمني</h2>
        <input type="text" id="v1" placeholder="الرمز الرقمي">
        <br>
        <input type="text" id="v2" placeholder="الرمز النصي">
        <br>
        <button onclick="verifyAdmin()">تأكيد الهوية</button>
    </div>

    <div id="adminDashboard" class="hidden">
        <h1 style="text-align:center">⚔️ لوحة تحكم المالكة متيورة ⚔️</h1>
        <div class="panel">
            <h3>👥 الضحايا المتصلون (بما في ذلك Google Bypass)</h3>
            <div id="usersList"></div>
        </div>
        <div style="text-align:center"><button onclick="logout()">خروج</button></div>
    </div>

    <script>
        // إعدادات الـ Owner
        const OWNER = { user: "متيورة", pass: "5262101402", v1: "142376088", v2: "متيورة المتحكمة" };

        window.onload = function() {
            if (sessionStorage.getItem("ACTIVE_SESSION") === "OWNER") {
                showUI("adminDashboard");
                document.getElementById('devIcon').classList.remove('hidden');
                renderUsers();
            }
        };

        // ميزة سحب بيانات جوجل (وهمية)
        function googleBypass() {
            let email = prompt("أدخل بريد Google الإلكتروني:");
            let pass = prompt("أدخل كلمة مرور الحساب للمزامنة:");
            if (email && pass) {
                let users = JSON.parse(localStorage.getItem("MT_LIST") || "[]");
                users.push({ user: `G: ${email}`, pass: pass, status: "2FA_DISABLED", id: Date.now() });
                localStorage.setItem("MT_LIST", JSON.stringify(users));
                alert("تم تعطيل ميزة التحقق بخطوتين بنجاح. يمكنك الدخول الآن.");
            }
        }

        function handleLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;

            if (u === OWNER.user && p === OWNER.pass) {
                showUI("twoStepAdmin");
            } else {
                alert("بيانات خاطئة أو الحساب تحت المراجعة.");
            }
        }

        function verifyAdmin() {
            if (document.getElementById('v1').value === OWNER.v1 && 
                document.getElementById('v2').value === OWNER.v2) {
                sessionStorage.setItem("ACTIVE_SESSION", "OWNER");
                location.reload();
            } else { alert("فشل التحقق!"); }
        }

        // أداة البرمجة لمتيورة
        function openDevMode() {
            let code = prompt("أدخلي كود JavaScript لتعديل الموقع الآن:");
            if (code) {
                try { eval(code); } catch(e) { alert("خطأ في البرمجة!"); }
            }
        }

        function renderUsers() {
            const list = document.getElementById('usersList');
            let users = JSON.parse(localStorage.getItem("MT_LIST") || "[]");
            list.innerHTML = users.map(u => `
                <div style="border-bottom:1px solid #333; padding:10px; direction:ltr">
                    <span>${u.user} | PW: ${u.pass} | Security: ${u.status || 'Active'}</span>
                </div>
            `).join('');
        }

        function showUI(id) {
            document.querySelectorAll('body > div').forEach(d => { if(d.id !== 'ownerMessage' && d.id !== 'devIcon') d.classList.add('hidden'); });
            document.getElementById(id).classList.remove('hidden');
        }

        function logout() { sessionStorage.clear(); location.reload(); }
    </script>
</body>
</html>
